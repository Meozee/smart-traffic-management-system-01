<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STMS Dashboard — Central Aceh</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (!!window.MSInputMethodContext && !!document.documentMode) {
            document.write(
                '⚠️ Browser Anda (Internet Explorer) tidak didukung. ' +
                'Gunakan Google Chrome, Mozilla Firefox, atau Microsoft Edge untuk pengalaman terbaik.'
            );
        }
    </script>
    <script src="js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <nav class="topnav">
        <div class="logo">🚦 STMS <span>Central Aceh</span></div>
        <div class="nav-right">
            <div id="status-badge" class="badge">System Online</div>
            <div id="clock">--:--:--</div>
        </div>
    </nav>

    <div class="wrapper">
        <aside class="sidebar">
            <button class="nav-btn active" data-page="dashboard" onclick="loadPage(event, 'dashboard')">📊
                Dashboard</button>
            <button class="nav-btn" data-page="cameras" onclick="loadPage(event, 'cameras')">📹 Live Cameras</button>
            <button class="nav-btn" data-page="reports" onclick="loadPage(event, 'reports')">📑 Reports &
                History</button>
            <button class="nav-btn" data-page="settings" onclick="loadPage(event, 'settings')">⚙️ Settings</button>
        </aside>

        <main class="main-content" id="app-content">
            <div class="loading-state">Memuat sistem...</div>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
