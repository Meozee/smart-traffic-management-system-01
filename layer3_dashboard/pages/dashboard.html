<div class="dashboard-header">
    <h1>Dashboard Traffic Control</h1>
    <p>Ringkasan real-time STMS berdasarkan data kamera dan alert aktif.</p>
</div>

<div id="alert-notification-bar" class="alert-notification" style="display:none;">
    <div id="alert-notification-text"></div>
    <button id="alert-ack-btn" class="btn-acknowledge" onclick="acknowledgeAlert(currentAlertId)">Acknowledge</button>
</div>

<div class="dashboard-grid">
    <div class="card stat">
        <div class="stat-icon">📷</div>
        <h4>Active Cameras</h4>
        <p id="val-active-cameras">0</p>
    </div>
    <div class="card stat">
        <div class="stat-icon">🚗</div>
        <h4>Kendaraan / 15 Menit</h4>
        <p id="val-vehicles">0</p>
    </div>
    <div class="card stat">
        <div class="stat-icon">🔔</div>
        <h4>Alert Aktif</h4>
        <p id="val-alerts">0</p>
    </div>
    <div class="card stat">
        <div class="stat-icon">⏱️</div>
        <h4>System Uptime</h4>
        <p id="val-uptime">0m</p>
    </div>
</div>

<div class="card chart-card">
    <h3>Traffic Density Trend</h3>
    <div class="chart-wrapper">
        <canvas id="trafficTrendChart"></canvas>
    </div>
</div>

<div class="card chart-card">
    <h3>Vehicle Classification</h3>
    <div class="chart-wrapper">
        <canvas id="classificationChart"></canvas>
    </div>
</div>
