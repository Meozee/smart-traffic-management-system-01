<div class="header">
    <h1>System Settings</h1>
    <p>Kelola sumber kamera, kapasitas jalan, dan status operasional sistem.</p>
</div>

<div class="card settings-card">
    <h3>➕ Tambah / Update Kamera</h3>
    <p style="color:#8b949e; font-size:0.85rem; margin-top:-8px; margin-bottom: 20px;">
        Gunakan ID yang sama untuk memperbarui data kamera yang sudah ada.
    </p>
    
    <form id="camera-form" class="cam-form">
        <div class="form-row">
            <div class="form-group">
                <label>Camera ID *</label>
                <input id="set-cam-id" type="text" placeholder="Contoh: CAM-01" required>
            </div>
            <div class="form-group">
                <label>Nama Lokasi *</label>
                <input id="set-cam-location" type="text" placeholder="Contoh: Simpang Empat Bebesen" required>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group" style="flex:2">
                <label>Stream URL (DroidCam/RTSP) *</label>
                <input id="set-cam-url" type="text" placeholder="http://192.168.x.x:4747/video" required>
            </div>
            <div class="form-group">
                <label>Road Capacity</label>
                <input id="set-cam-capacity" type="number" placeholder="100" value="100">
            </div>
        </div>
        
        <button type="submit" class="btn-save">💾 Simpan Konfigurasi</button>
    </form>
</div>

<div class="card table-card">
    <h3>📋 Daftar Semua Kamera</h3>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Camera ID</th>
                    <th>Lokasi</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="settings-camera-table">
                <tr><td colspan="4" style="text-align:center;color:#8b949e">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>
