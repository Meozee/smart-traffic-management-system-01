<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STMS — Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Style Tambahan Khusus Halaman Login agar Center di Layar */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0d1117;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 30px;
        }
        .login-btn {
            width: 100%;
            padding: 10px;
            background: #238636;
            color: white;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .login-btn:hover { background: #2ea44f; }
        .error-msg { color: #f85149; font-size: 0.85rem; margin-top: 10px; text-align: center; display: none; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="card login-card">
            <h2 style="text-align: center; margin-bottom: 5px;">🚦 STMS Admin</h2>
            <p style="text-align: center; color: #8b949e; font-size: 0.9rem; margin-bottom: 25px;">Smart Traffic Monitoring System</p>
            
            <form id="login-form" class="cam-form">
                <div class="form-group">
                    <label>Username</label>
                    <input id="login-username" type="text" placeholder="Masukkan username admin" required>
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Password</label>
                    <input id="login-password" type="password" placeholder="Masukkan password" required>
                </div>
                
                <div id="error-box" class="error-msg">❌ Username atau password salah</div>
                
                <button type="submit" class="login-btn">Masuk ke Sistem</button>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
