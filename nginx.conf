# ═══════════════════════════════════════════════════════════════════════════════
# NGINX CONFIGURATION for STMS Frontend
#
# Serves static files (HTML, CSS, JS) from /usr/share/nginx/html
# Proxies /api requests to backend container on http://backend:8000
# ═══════════════════════════════════════════════════════════════════════════════

server {
    listen 80 default_server;
    server_name _;
    
    # Disable server tokens for security
    server_tokens off;
    
    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html index.htm;
    
    # ─────────────────────────────────────────────────────────────────────────
    # STATIC FILES (HTML, CSS, JS, images, etc.)
    # ─────────────────────────────────────────────────────────────────────────
    
    location / {
        # Try file directly, then directory, then fallback to index.html for SPA
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }
    
    # ─────────────────────────────────────────────────────────────────────────
    # API PROXY — Routes /api requests to FastAPI backend
    # ─────────────────────────────────────────────────────────────────────────
    
    location /api {
        # Proxy to backend container (via internal Docker network)
        proxy_pass http://backend:8000;
        
        # Preserve original request information
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (for streaming responses)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Disable buffering for streaming responses (MJPEG streams)
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Timeouts for streaming
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
        
        # Avoid caching API responses
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # ─────────────────────────────────────────────────────────────────────────
    # HEALTH CHECK endpoint
    # ─────────────────────────────────────────────────────────────────────────
    
    location /health {
        access_log off;
        return 200 "nginx is running\n";
        add_header Content-Type text/plain;
    }
    
    # ─────────────────────────────────────────────────────────────────────────
    # ERROR PAGES
    # ─────────────────────────────────────────────────────────────────────────
    
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    # ─────────────────────────────────────────────────────────────────────────
    # SECURITY HEADERS
    # ─────────────────────────────────────────────────────────────────────────
    
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # ─────────────────────────────────────────────────────────────────────────
    # GZIP COMPRESSION
    # ─────────────────────────────────────────────────────────────────────────
    
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json;
}