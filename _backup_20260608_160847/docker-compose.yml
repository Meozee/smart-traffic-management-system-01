# ═══════════════════════════════════════════════════════════════════════════════
# SMART TRAFFIC MONITORING SYSTEM (STMS) — Docker Compose Orchestration
# ═══════════════════════════════════════════════════════════════════════════════
# Services:
#   - db: PostgreSQL 15 (database)
#   - backend: FastAPI application server
#   - frontend: Nginx serving dashboard HTML/CSS/JS
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ═══════════════════════════════════════════════════════════════════════════════
  # SERVICE: PostgreSQL Database
  # ═══════════════════════════════════════════════════════════════════════════════
  db:
    image: postgres:15
    container_name: stms_db
    restart: always

    # Read configuration from .env file in project root
    env_file: .env

    # Database credentials (HARUS match dengan DATABASE_URL di .env)
    environment:
      POSTGRES_USER: stms_user
      POSTGRES_PASSWORD: miko
      POSTGRES_DB: stms_db
      # Timezone configuration
      TZ: Asia/Jakarta
      PGTZ: Asia/Jakarta

    # Volume untuk persisten data database
    volumes:
      - postgres_data:/var/lib/postgresql/data

    # Network untuk komunikasi antar-service
    networks:
      - stms_network

    # Healthcheck agar backend tunggu DB siap sebelum connect
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U stms_user -d stms_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

    # Port mapping (localhost:5432 untuk akses direct, optional)
    ports:
      - "5432:5432"

  # ═══════════════════════════════════════════════════════════════════════════════
  # SERVICE: FastAPI Backend Server
  # ═══════════════════════════════════════════════════════════════════════════════
  backend:
    build:
      context: ./layer2_backend
      dockerfile: Dockerfile

    container_name: stms_backend
    restart: always

    # Read configuration from .env file
    env_file: .env

    # Port mapping untuk akses HTTP API
    ports:
      - "8000:8000"

    # Backend tunggu database siap dahulu (healthcheck condition)
    depends_on:
      db:
        condition: service_healthy

    # Network untuk komunikasi dengan db dan frontend
    networks:
      - stms_network

    # Volume mounts:
    # 1. YOLOv8 model weights (jangan copy ke image, mount dari host)
    # 2. Video file untuk testing (optional)
    # 3. Logs dan output (optional)
    volumes:
      - ./layer1_cv/yolov8n.pt:/app/yolov8n.pt:ro
      - ./layer1_cv/traffic.mp4:/app/traffic.mp4:ro

    # Environment-specific variables (opsional, override atau complement .env)
    environment:
      # Bisa add environment variable lain yang tidak sensitive
      APP_NAME: "STMS API"
      VERSION: "1.0.0"

  # ═══════════════════════════════════════════════════════════════════════════════
  # SERVICE: Nginx — Frontend Dashboard Server
  # ═══════════════════════════════════════════════════════════════════════════════
  frontend:
    image: nginx:alpine
    container_name: stms_frontend
    restart: always

    # Port mapping
    # Port 80 (HTTP) → nginx → serve dashboard
    # Alternatif: bisa tambah port 443 untuk HTTPS (buat cert dulu)
    ports:
      - "80:80"

    # Volume mount: folder dashboard HTML/CSS/JS ke nginx docroot
    # Read-only (ro) karena hanya serve static files
    volumes:
      - ./layer3_dashboard:/usr/share/nginx/html:ro
      # Optional: custom nginx config
      # - ./nginx.conf:/etc/nginx/nginx.conf:ro

    # Network untuk komunikasi dengan backend
    networks:
      - stms_network

    # Frontend tunggu backend siap (optional, tapi good practice)
    depends_on:
      - backend

# ═══════════════════════════════════════════════════════════════════════════════
# VOLUMES
# ═══════════════════════════════════════════════════════════════════════════════

volumes:
  # PostgreSQL data persistence
  postgres_data:
    driver: local

# ═══════════════════════════════════════════════════════════════════════════════
# NETWORKS
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  # Internal network untuk komunikasi antar-service
  # Service berkomunikasi via service name (hostname)
  # Contoh: db:5432, backend:8000 (bukan localhost)
  stms_network:
    driver: bridge