<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STMS — Login</title>
    <script>
        if (!!window.MSInputMethodContext && !!document.documentMode) {
            document.write('⚠️ Browser Anda (Internet Explorer) tidak didukung.');
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg);
        }
        .login-card {
            width: 100%;
            max-width: 380px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .login-icon {
            width: 48px; height: 48px;
            background: var(--accent);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 14px;
        }
        .login-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.4px;
        }
        .login-sub {
            font-size: 13px;
            color: var(--text3);
            margin-top: 4px;
            font-family: var(--mono);
        }
        .login-field { margin-bottom: 14px; }
        .login-field label {
            display: block;
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .login-field input {
            width: 100%;
            min-width: unset;
        }
        .login-btn {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font);
            margin-top: 8px;
            transition: background .15s;
        }
        .login-btn:hover { background: #6b9ef8; }
        .error-msg {
            color: var(--red);
            font-size: 12.5px;
            margin-top: 10px;
            text-align: center;
            display: none;
            background: var(--red-dim);
            border: 1px solid rgba(248,113,113,.2);
            border-radius: 7px;
            padding: 8px 12px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="card login-card">
            <div class="login-header">
                <div class="login-icon">🚦</div>
                <div class="login-title">STMS Admin</div>
                <div class="login-sub">Smart Traffic Monitoring System · Central Aceh</div>
            </div>

            <form id="login-form">
                <div class="login-field">
                    <label>Username</label>
                    <input id="login-username" type="text" placeholder="Masukkan username" required>
                </div>
                <div class="login-field">
                    <label>Password</label>
                    <input id="login-password" type="password" placeholder="Masukkan password" required>
                </div>
                <div id="error-box" class="error-msg">❌ Username atau password salah</div>
                <button type="submit" class="login-btn">Masuk ke Sistem</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
