# ═══════════════════════════════════════════════════════════════════════════════
# SMART TRAFFIC MONITORING SYSTEM (STMS) — Docker Compose Orchestration
#
# Services:
#   - db: PostgreSQL 15 (database)
#   - backend: FastAPI application server
#   - frontend: Nginx serving dashboard (with API proxy)
#
# FIXED: Added nginx configuration, proper service networking, volume mounts
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.9'

services:

  # ═══════════════════════════════════════════════════════════════════════════════
  # SERVICE: PostgreSQL Database
  # ═══════════════════════════════════════════════════════════════════════════════
  db:
    image: postgres:15
    container_name: stms_db
    restart: unless-stopped
    
    env_file: .env
    
    environment:
      POSTGRES_USER: stms_user
      POSTGRES_PASSWORD: miko
      POSTGRES_DB: stms_db
      TZ: Asia/Jakarta
      PGTZ: Asia/Jakarta
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    networks:
      - stms_network
    
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U stms_user -d stms_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    ports:
      - "5432:5432"


  # ═══════════════════════════════════════════════════════════════════════════════
  # SERVICE: FastAPI Backend Server
  # ═══════════════════════════════════════════════════════════════════════════════
  backend:
    build:
      context: ./layer2_backend
      dockerfile: Dockerfile
    
    container_name: stms_backend
    restart: unless-stopped
    
    env_file: .env
    
    ports:
      - "8000:8000"
    
    depends_on:
      db:
        condition: service_healthy
    
    networks:
      - stms_network
    
    volumes:
      # YOLOv8 model weights (read-only from host)
      - ./layer1_cv/weights/yolov8n.pt:/app/yolov8n.pt:ro
      # Video file for testing (read-only from host)
      - ./layer1_cv/traffic.mp4:/app/traffic.mp4:ro
      # Optional: logs volume
      - ./logs/backend:/app/logs
    
    environment:
      APP_NAME: "STMS API"
      VERSION: "1.0.0"
      LOG_LEVEL: "INFO"
    
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


  # ═══════════════════════════════════════════════════════════════════════════════
  # SERVICE: Nginx — Frontend Dashboard Server with API Proxy
  # ═══════════════════════════════════════════════════════════════════════════════
  frontend:
    image: nginx:alpine
    container_name: stms_frontend
    restart: unless-stopped
    
    ports:
      - "80:80"
    
    volumes:
      # Static dashboard files (read-only)
      - ./layer3_dashboard:/usr/share/nginx/html:ro
      # Nginx configuration (with API proxy)
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    
    networks:
      - stms_network
    
    depends_on:
      - backend
    
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s


  # ═══════════════════════════════════════════════════════════════════════════════
  # SERVICE: Computer Vision (Layer 1) — Optional, can run separately
  # ═══════════════════════════════════════════════════════════════════════════════
  # Uncomment to run CV inside Docker (requires GPU setup)
  # cv:
  #   build:
  #     context: ./layer1_cv
  #     dockerfile: Dockerfile
  #   container_name: stms_cv
  #   restart: unless-stopped
  #   env_file: .env
  #   depends_on:
  #     - backend
  #   networks:
  #     - stms_network
  #   volumes:
  #     - ./layer1_cv/traffic.mp4:/app/traffic.mp4:ro
  #     - ./logs/cv:/app/logs
  #   environment:
  #     API_BASE_URL: "http://backend:8000"
  #     INTERNAL_API_KEY: "${INTERNAL_API_KEY}"


# ═══════════════════════════════════════════════════════════════════════════════
# VOLUMES — Persistent storage
# ═══════════════════════════════════════════════════════════════════════════════

volumes:
  postgres_data:
    driver: local


# ═══════════════════════════════════════════════════════════════════════════════
# NETWORKS — Service-to-service communication
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  stms_network:
    driver: bridge
    # Services access each other by container name:
    # - frontend → backend via http://backend:8000
    # - backend → db via postgresql://db:5432